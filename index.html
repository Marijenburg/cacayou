<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#bfe0a8" />
  <title>Cacayou</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #bfe0a8; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; touch-action: none; overscroll-behavior: none; }
    #game { display: block; position: fixed; inset: 0; }
    #fs {
      position: fixed; top: env(safe-area-inset-top, 8px); right: 8px; z-index: 10;
      color: #3b5a2e; background: rgba(255,255,255,0.6); border: 1px solid rgba(59,90,46,0.3);
      border-radius: 8px; width: 34px; height: 30px; font: 16px system-ui, sans-serif;
      cursor: pointer; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    #title {
      position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: radial-gradient(120% 100% at 50% 30%, #d6efc6 0%, #bfe0a8 60%, #a9d492 100%);
      color: #34502a; text-align: center; padding: 24px;
    }
    #title h1 { font-size: clamp(28px, 8vw, 52px); font-weight: 800; letter-spacing: 0.02em; }
    #title p { font-size: 14px; opacity: 0.75; max-width: 320px; line-height: 1.5; }
    #playBtn, #continueBtn {
      margin-top: 4px; padding: 14px 34px; font-size: 18px; font-weight: 700; color: #fff;
      background: #6bab4e; border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 6px 0 #4e8437, 0 8px 16px rgba(0,0,0,0.15);
    }
    #playBtn:active, #continueBtn:active { transform: translateY(3px); box-shadow: 0 3px 0 #4e8437, 0 5px 10px rgba(0,0,0,0.15); }
    #playBtn.secondary {
      background: #8fbf6e; box-shadow: 0 5px 0 #6d9a54, 0 7px 12px rgba(0,0,0,0.12);
      font-size: 15px; padding: 11px 26px;
    }
    #playBtn.secondary:active { box-shadow: 0 2px 0 #6d9a54, 0 4px 8px rgba(0,0,0,0.12); }
    #ver { position: absolute; bottom: 12px; font: 11px monospace; color: #4e7a3a; opacity: 0.6; }
    #settingsBtn {
      position: fixed; top: env(safe-area-inset-top, 8px); right: 48px; z-index: 10;
      color: #3b5a2e; background: rgba(255,255,255,0.6); border: 1px solid rgba(59,90,46,0.3);
      border-radius: 8px; width: 34px; height: 30px; font: 17px system-ui, sans-serif;
      cursor: pointer; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    #settings {
      position: fixed; inset: 0; z-index: 30; display: none;
      align-items: center; justify-content: center; padding: 24px; background: rgba(20,30,16,0.55);
    }
    #settings.open { display: flex; }
    #settingsPanel {
      background: #eef6e4; color: #34502a; border-radius: 16px; padding: 20px 22px;
      width: 100%; max-width: 340px; box-shadow: 0 12px 30px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; gap: 16px;
    }
    #settingsPanel h2 { font-size: 20px; font-weight: 800; text-align: center; }
    .set-row { display: flex; flex-direction: column; gap: 6px; }
    .set-row label { font-size: 13px; font-weight: 700; opacity: 0.85; }
    .set-row input[type=range] { width: 100%; accent-color: #6bab4e; height: 28px; }
    #tpBtn {
      padding: 12px; font-size: 15px; font-weight: 700; color: #fff; background: #6bab4e;
      border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #4e8437;
    }
    #tpBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #4e8437; }
    #closeSet {
      padding: 10px; font-size: 14px; font-weight: 700; color: #34502a; background: transparent;
      border: 1px solid rgba(59,90,46,0.4); border-radius: 10px; cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <button id="fs" title="Fullscreen">&#9974;</button>
  <button id="settingsBtn" title="Settings">&#9881;</button>
  <div id="settings">
    <div id="settingsPanel">
      <h2>Settings</h2>
      <div class="set-row">
        <label>Volume: <span id="volVal">100%</span></label>
        <input type="range" id="volRange" min="0" max="100" value="100">
      </div>
      <div class="set-row">
        <label>Brightness: <span id="brightVal">100%</span></label>
        <input type="range" id="brightRange" min="50" max="150" value="100">
      </div>
      <button id="tpBtn">Teleport to campfire</button>
      <button id="closeSet">Close</button>
    </div>
  </div>
  <div id="title">
    <h1>Cacayou</h1>
    <button id="continueBtn" style="display:none">Continue</button>
    <button id="playBtn">New Game</button>
    <div id="ver">v0.0.0</div>
  </div>
  <script src="game.js"></script>
</body>
</html>
